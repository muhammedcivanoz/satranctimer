<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satranç Saati</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            background-color: #1a1a2e;
            color: white;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: row;
            /* Yan yana */
        }

        .player {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 8rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* Oyuncu 1 - Sol Taraf (Beyaz) */
        #player1 {
            background-color: #f1f2f6;
            color: #2f3542;
        }

        /* Oyuncu 2 - Sağ Taraf (Siyah) */
        #player2 {
            background-color: #2f3542;
            color: #f1f2f6;
        }

        /* Aktif oyuncu efekti */
        .active {
            box-shadow: inset 0 0 50px rgba(46, 204, 113, 0.5);
            background-color: #2ecc71 !important;
            /* Yeşil yansıma */
            color: white !important;
        }

        .losing-time {
            color: #e74c3c !important;
            /* 10 saniye kala kırmızı */
        }

        .game-over {
            background-color: #e74c3c !important;
            color: white !important;
        }

        /* Kontrol Paneli (Ortada ince şerit) */
        .controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            align-items: center;
        }

        button {
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }

        .hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            color: #bdc3c7;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
            z-index: 5;
        }

        .time-setup {
            display: flex;
            gap: 10px;
            color: white;
            font-size: 1.2rem;
            align-items: center;
        }

        input[type="number"] {
            width: 60px;
            padding: 5px;
            font-size: 1.2rem;
            border-radius: 5px;
            border: none;
            text-align: center;
        }

        /* Responsive & Mobil Tasarım */
        @media (max-width: 768px) and (orientation: portrait) {
            .container {
                flex-direction: column;
            }
            #player1 {
                transform: rotate(180deg);
            }
            .player {
                font-size: 5.5rem;
            }
            .controls {
                width: 90%;
                max-width: 350px;
                padding: 15px;
            }
            button {
                padding: 10px 20px;
                font-size: 1rem;
            }
            .hint {
                font-size: 0.85rem;
                bottom: 10px;
            }
            .time-setup {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-width: 1024px) and (orientation: landscape) {
            .player {
                font-size: 6rem;
            }
            .controls {
                transform: translate(-50%, -50%) scale(0.85);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="player1" class="player" onpointerdown="event.preventDefault(); switchTurnTo(2)">
            <div id="time1">05:00</div>
        </div>

        <div id="player2" class="player" onpointerdown="event.preventDefault(); switchTurnTo(1)">
            <div id="time2">05:00</div>
        </div>
    </div>

    <!-- Orta Kontrol Paneli -->
    <div class="controls" id="controlPanel">
        <!-- Satranç Modu Seçimi -->
        <div style="color: white; font-weight: bold; margin-bottom: 5px;">Satranç Modu</div>
        <select id="gameMode" onchange="updateMode()"
            style="padding: 8px; font-size: 1rem; border-radius: 5px; cursor: pointer;">
            <option value="custom">Özel Süre</option>
            <option value="1">Bullet (1 Dk)</option>
            <option value="3">Blitz (3 Dk)</option>
            <option value="5" selected>Blitz (5 Dk)</option>
            <option value="10">Rapid (10 Dk)</option>
            <option value="15">Rapid (15 Dk)</option>
            <option value="30">Klasik (30 Dk)</option>
        </select>

        <div class="time-setup" id="customTimeSetup">
            <label>Süre:</label>
            <label for="minutes" style="font-size: 0.9rem;">Dk</label>
            <input type="number" id="minutes" value="5" min="0" max="180">
            <span style="color:white; font-weight:bold;">:</span>
            <label for="seconds" style="font-size: 0.9rem;">Sn</label>
            <input type="number" id="seconds" value="0" min="0" max="59">
        </div>

        <div class="volume-setup"
            style="display: flex; gap: 10px; color: white; flex-direction: column; align-items: center; margin-top: 10px; margin-bottom: 10px;">
            <label for="volumeControl" style="font-size: 1rem;">Müzik Sesi</label>
            <input type="range" id="volumeControl" min="0" max="1" step="0.05" value="0.5"
                oninput="changeVolume(this.value)" style="width: 100px;">
        </div>

        <button onclick="startGame()">BAŞLAT</button>
        <button onclick="pauseGame()" id="pauseBtn" style="display:none; background-color: #f39c12;">DURAKLAT</button>
        <button onclick="resetGame()" style="background-color: #e74c3c;">SIFIRLA</button>
    </div>

    <div class="hint" id="hintText">Devam etmek / Sıra değiştirmek için <strong>SPACE</strong> tuşuna basın.</div>

    <script>
        // Değişkenler
        let initialTime = 5 * 60 * 1000; // Varsayılan 5 dakika (milisaniye cinsinden)
        let time1 = initialTime;
        let time2 = initialTime;
        let activePlayer = 0; // 0: Duraklatılmış/Başlamadı, 1: Oyuncu 1, 2: Oyuncu 2
        let timerInterval = null;
        let lastUpdateTime = 0;

        // DOM Elementleri
        const p1Div = document.getElementById('player1');
        const p2Div = document.getElementById('player2');
        const t1Display = document.getElementById('time1');
        const t2Display = document.getElementById('time2');
        const pauseBtn = document.getElementById('pauseBtn');
        const minutesInput = document.getElementById('minutes');
        const secondsInput = document.getElementById('seconds');
        const gameModeSelect = document.getElementById('gameMode');
        const customTimeSetup = document.getElementById('customTimeSetup');

        // Satranç modu değiştiğinde UI güncelle
        function updateMode() {
            const mode = gameModeSelect.value;
            if (mode === 'custom') {
                customTimeSetup.style.display = 'flex';
            } else {
                customTimeSetup.style.display = 'none';
                minutesInput.value = mode;
                secondsInput.value = 0;
            }
            // Anında değişikliği ekrana yansıtmak için süreleri resetle
            resetGame();
        }

        // Başlangıçta custom kısmını gizle (çünkü varsayılan 5dk Blitz)
        customTimeSetup.style.display = 'none';

        // Zamanı biçimlendirme fonksiyonu (MM:SS)
        function formatTime(ms) {
            if (ms <= 0) return "00:00.0"; // Süre bittiyse milisaniyeli göster

            let totalSeconds = Math.floor(ms / 1000);
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;

            // 10 saniyenin altındaysa saliseleri de göster
            if (ms < 10000) {
                let tenths = Math.floor((ms % 1000) / 100);
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${tenths}`;
            }

            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // Ekranı Güncelleme
        function updateDisplays() {
            t1Display.innerText = formatTime(time1);
            t2Display.innerText = formatTime(time2);

            // 10 saniye uyarısı kırmızısı
            if (time1 > 0 && time1 <= 10000) t1Display.classList.add('losing-time');
            else t1Display.classList.remove('losing-time');

            if (time2 > 0 && time2 <= 10000) t2Display.classList.add('losing-time');
            else t2Display.classList.remove('losing-time');
        }

        // Oyunu Başlat
        let audioPlayer = null;
        function startGame() {
            if (activePlayer !== 0) return; // Zaten oyun devam ediyorsa

            // Eğer müzik henüz başlamadıysa, indirdiğimiz yerel ses dosyasını (cildir_sarki.ogg) çaldır
            if (!audioPlayer) {
                audioPlayer = new Audio('cildir_sarki.ogg');
                audioPlayer.loop = true; // Şarkı bitince başa sarsın
                audioPlayer.volume = document.getElementById('volumeControl').value;
            }

            // Başla / devam et tıklandığında şarkıyı da çal
            audioPlayer.play().catch(e => console.error("Ses çalınamadı:", e));

            // Eğer süreler sıfırlanmışsa, inputtan yeni süreyi al
            if (time1 === initialTime && time2 === initialTime) {
                let mins = parseInt(minutesInput.value) || 0;
                let secs = parseInt(secondsInput.value) || 0;
                initialTime = (mins * 60 + secs) * 1000;
                time1 = initialTime;
                time2 = initialTime;
                updateDisplays();
            }

            // Varsayılan olarak Oyuncu 1 başlar
            activePlayer = 1;
            pauseBtn.style.display = 'block';

            lastUpdateTime = performance.now();
            timerInterval = requestAnimationFrame(updateTimer);
            updateUIActiveState();
        }

        // Zamanlayıcı Döngüsü (Yüksek hassasiyet)
        function updateTimer(currentTime) {
            if (activePlayer === 0) return; // Oyun duraklatılmışsa çık

            let deltaTime = currentTime - lastUpdateTime;
            lastUpdateTime = currentTime;

            if (activePlayer === 1) {
                time1 -= deltaTime;
                if (time1 <= 0) {
                    time1 = 0;
                    endGame(1);
                }
            } else if (activePlayer === 2) {
                time2 -= deltaTime;
                if (time2 <= 0) {
                    time2 = 0;
                    endGame(2);
                }
            }

            updateDisplays();

            if (activePlayer !== 0) {
                timerInterval = requestAnimationFrame(updateTimer);
            }
        }

        // Sıra Değiştir (Space tuşu veya tıklama ile)
        function switchTurn(forcePlayer = null) {
            // Eğer süre bittiyse tıklama veya space çalışmasın
            if (time1 <= 0 || time2 <= 0) return;

            // Eğer oyun hiç başlamadıysa başlat
            if (activePlayer === 0) {
                startGame();
                return;
            }

            // Eğer belli bir oyuncuya tıklanarak geçiş yapıldıysa
            if (forcePlayer !== null) {
                if (activePlayer !== forcePlayer) { // Kendi sırası değilken karşıya basarsa geçiş yap (Telefondan kolaylık)
                    activePlayer = forcePlayer;
                } else {
                    return; // Kendi paneline tıklarsa sırayı değiştirme (Hamlesini bitirdiğinde kendi paneline vurur)
                }
            } else {
                // Space tuşuna basıldıysa sırayı değiştir
                activePlayer = activePlayer === 1 ? 2 : 1;
            }

            updateUIActiveState();
        }

        // Tıklanan oyuncunun saati çalışacak şekilde ayarla. 
        function switchTurnTo(nextPlayer) {
            if (time1 <= 0 || time2 <= 0) return;

            if (activePlayer === 0) {
                startGame();
                activePlayer = nextPlayer; // Baştan kim başlasın ayarı
            } else {
                activePlayer = nextPlayer;
            }
            updateUIActiveState();
        }

        // Arka Plan Renklerini Güncelle
        function updateUIActiveState() {
            p1Div.classList.remove('active');
            p2Div.classList.remove('active');

            if (activePlayer === 1) {
                p1Div.classList.add('active');
            } else if (activePlayer === 2) {
                p2Div.classList.add('active');
            }
        }

        // Süre Bitti
        function endGame(loser) {
            activePlayer = 0;
            cancelAnimationFrame(timerInterval);

            p1Div.classList.remove('active');
            p2Div.classList.remove('active');

            if (loser === 1) {
                p1Div.classList.add('game-over');
            } else {
                p2Div.classList.add('game-over');
            }

            document.getElementById('hintText').innerHTML = "Süre bitti! Yeni oyun için 'Sıfırla'ya basın.";
            pauseBtn.style.display = 'none';

            // Şarkı devam ediyorsa durdur
            if (audioPlayer) {
                audioPlayer.pause();
                audioPlayer.currentTime = 0; // Başa sar
            }
        }

        // Oyunu Duraklat
        function pauseGame() {
            activePlayer = 0;
            updateUIActiveState();
            pauseBtn.style.display = 'none';

            // Duraklatıldığında şarkı da dursun (Sıra değişmeden duraklatırsak)
            if (audioPlayer) {
                audioPlayer.pause();
            }
        }

        // Oyunu Sıfırla
        function resetGame() {
            activePlayer = 0;
            cancelAnimationFrame(timerInterval);

            let mins = 0;
            let secs = 0;

            const mode = gameModeSelect.value;
            if (mode === 'custom') {
                mins = parseInt(minutesInput.value) || 0;
                secs = parseInt(secondsInput.value) || 0;
            } else {
                mins = parseInt(mode) || 5;
            }

            initialTime = (mins * 60 + secs) * 1000;
            time1 = initialTime;
            time2 = initialTime;

            p1Div.classList.remove('game-over', 'active');
            p2Div.classList.remove('game-over', 'active');

            document.getElementById('hintText').innerHTML = "Devam etmek / Sıra değiştirmek için <strong>SPACE</strong> tuşuna basın.";
            pauseBtn.style.display = 'none';

            // Sıfırlanınca şarkıyı sıfırla ve durdur
            if (audioPlayer) {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                audioPlayer = null; // Tekrar başladığında yeniden başlatılabilir
            }

            updateDisplays();
        }

        // Şarkının ses ayarı fonksiyonu
        function changeVolume(value) {
            if (audioPlayer) {
                audioPlayer.volume = value;
            }
        }

        // Klavye Eventi (SPACE tuşu ile geçiş)
        document.addEventListener('keydown', function (event) {
            if (event.code === 'Space') {
                event.preventDefault(); // Sayfa kaymasını engelle
                switchTurn();
            }
        });

        // Başlangıç değerlerini ekrana yaz
        updateDisplays();
    </script>
</body>

</html>
